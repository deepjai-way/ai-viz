<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1425"/>
    </linearGradient>
    <marker id="wah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="url(#wbg)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">How ai-viz Works</text>
  <text x="480" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">From description to professional diagrams — one command</text>

  <!-- Phase labels -->
  <text x="100" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fbbf24">① INIT</text>
  <text x="350" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#60a5fa">② COMPILE</text>
  <text x="700" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#34d399">③ ADAPT</text>

  <!-- Init box -->
  <rect x="25" y="105" width="150" height="55" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="130" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fbbf24">npx ai-viz init</text>
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">交互式向导</text>

  <!-- Core inputs -->
  <rect x="225" y="105" width="110" height="45" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="280" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#60a5fa">方法论</text>
  <text x="280" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">core/</text>

  <rect x="350" y="105" width="110" height="45" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.2"/>
  <text x="405" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#34d399">插件指令</text>
  <text x="405" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">plugins/</text>

  <rect x="225" y="160" width="110" height="45" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="280" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#60a5fa">路由规则</text>
  <text x="280" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">routing</text>

  <rect x="350" y="160" width="110" height="45" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.2"/>
  <text x="405" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#34d399">设计语言</text>
  <text x="405" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">yaml config</text>

  <!-- Compiler -->
  <rect x="265" y="225" width="170" height="48" rx="10" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-width="2"/>
  <text x="350" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#60a5fa">Compiler</text>
  <text x="350" y="264" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">编译 + 组装</text>

  <!-- Arrows to compiler -->
  <line x1="280" y1="150" x2="310" y2="225" stroke="#60a5fa" stroke-width="1.3" marker-end="url(#wah)"/>
  <line x1="405" y1="150" x2="385" y2="225" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <line x1="280" y1="205" x2="310" y2="225" stroke="#60a5fa" stroke-width="1.3"/>
  <line x1="405" y1="205" x2="385" y2="225" stroke="#34d399" stroke-width="1.3"/>
  <line x1="175" y1="132" x2="225" y2="127" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#wah)"/>

  <!-- Adapter outputs -->
  <rect x="580" y="100" width="170" height="34" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="665" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Claude Code</text>
  <text x="665" y="129" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">.claude/skills/ai-viz/</text>

  <rect x="580" y="142" width="170" height="34" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="665" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Cursor / Windsurf</text>
  <text x="665" y="171" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">.cursor/rules/</text>

  <rect x="580" y="184" width="170" height="34" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="665" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Qoder / Copilot</text>
  <text x="665" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">skills/ai-viz/</text>

  <rect x="580" y="226" width="170" height="34" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="665" y="244" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Aider / Trae / ...</text>
  <text x="665" y="255" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">tool-native dirs</text>

  <!-- Compiler to adapters -->
  <line x1="435" y1="240" x2="580" y2="117" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <line x1="435" y1="243" x2="580" y2="159" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <line x1="435" y1="246" x2="580" y2="201" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <line x1="435" y1="249" x2="580" y2="243" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <text x="510" y="185" font-family="sans-serif" font-size="9" fill="#64748b" transform="rotate(-22,510,185)">Adapter</text>

  <!-- Phase 4: Use -->
  <text x="430" y="315" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fb7185">④ USE</text>

  <!-- User box -->
  <rect x="80" y="330" width="150" height="60" rx="10" fill="#1e293b" stroke="#fb7185" stroke-width="1.5"/>
  <text x="155" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fb7185">👤 用户</text>
  <text x="155" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">"画一个架构图"</text>

  <!-- AI Tool box -->
  <rect x="310" y="330" width="180" height="60" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="400" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#60a5fa">🤖 AI 编程工具</text>
  <text x="400" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">读取指令 + 生成图表</text>

  <!-- Output box -->
  <rect x="570" y="330" width="160" height="60" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="650" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#34d399">📊 专业图表</text>
  <text x="650" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">drawio / mermaid / ...</text>

  <!-- Phase 4 arrows -->
  <line x1="230" y1="360" x2="310" y2="360" stroke="#fb7185" stroke-width="1.3" marker-end="url(#wah)"/>
  <text x="270" y="352" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">描述需求</text>
  <line x1="490" y1="360" x2="570" y2="360" stroke="#34d399" stroke-width="1.3" marker-end="url(#wah)"/>
  <text x="530" y="352" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">输出文件</text>

  <!-- Dashed from adapters to AI tool -->
  <line x1="665" y1="260" x2="460" y2="330" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#wah)"/>

  <!-- Output examples -->
  <rect x="90" y="420" width="110" height="26" rx="5" fill="#1e293b" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="145" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">.drawio</text>
  <rect x="230" y="420" width="110" height="26" rx="5" fill="#1e293b" stroke="#34d399" stroke-width="0.8"/>
  <text x="285" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">mermaid code</text>
  <rect x="370" y="420" width="110" height="26" rx="5" fill="#1e293b" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="425" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">.excalidraw</text>
  <rect x="510" y="420" width="110" height="26" rx="5" fill="#1e293b" stroke="#fb7185" stroke-width="0.8"/>
  <text x="565" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#fb7185">.png</text>
</svg>
